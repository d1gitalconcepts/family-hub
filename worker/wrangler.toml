name = "family-hub-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

[triggers]
# Two separate cron triggers = two separate invocations = two separate subrequest budgets.
# Calendar sync fires at 0,5,10... — sports fires at 2,7,12... (offset so events exist first).
crons = ["*/5 * * * *", "2-59/5 * * * *"]

# Subrequest limit: free plan = 50, Workers Paid = up to 1000.
# With 16+ calendars you may hit the free limit on busy syncs.
# To increase: upgrade to Workers Paid ($5/mo) at dash.cloudflare.com,
# then uncomment the block below and redeploy.
#
# [limits]
# subrequests = 1000

# Secrets are set via: npx wrangler secret put SECRET_NAME
# Required secrets:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   GOOGLE_REFRESH_TOKEN     (run: node get-token.js to obtain)
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_EMAIL
#   SUPABASE_PASSWORD
